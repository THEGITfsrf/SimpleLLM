<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplication Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: white;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        #problem {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        input {
            padding: 15px 20px;
            font-size: 24px;
            border: 3px solid white;
            border-radius: 10px;
            width: 200px;
            text-align: center;
        }
        #submit-btn {
            padding: 15px 30px;
            font-size: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            margin-left: 10px;
        }
        #submit-btn:hover {
            transform: scale(1.05);
        }
        #message {
            font-size: 28px;
            margin-top: 10px;
            min-height: 36px;
        }
        #score {
            font-size: 24px;
            margin-top: 10px;
        }
        #timer {
            font-size: 24px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="game-ui">
        <h1>3D Multiplication Game</h1>
        <div id="problem"></div>
        <input type="text" id="answer-input" placeholder="?" autocomplete="off">
        <button id="submit-btn">Submit</button>
        <div id="message"></div>
        <div id="score">Score: 0</div>
        <div id="timer">Time: 60 seconds</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
